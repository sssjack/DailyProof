<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DailyProof workflow">
  <defs>
    <linearGradient id="flowBg" x1="0" y1="0" x2="1200" y2="420">
      <stop stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
    <linearGradient id="flowAccent" x1="130" y1="100" x2="1060" y2="320">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="flowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
