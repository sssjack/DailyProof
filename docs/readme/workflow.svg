    <text x="92" y="276" fill="#64748b" font-family="Arial, sans-serif" font-size="14">目标 / 节奏 / 指标</text>
  </g>
  <g filter="url(#flowShadow)">
    <rect x="292" y="166" width="184" height="128" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="312" y="186" width="44" height="44" rx="14" fill="#ecfeff"/>
    <text x="328" y="215" fill="#0891b2" font-family="Arial, sans-serif" font-size="20" font-weight="900">2</text>
    <text x="312" y="252" fill="#0f172a" font-family="Arial, sans-serif" font-size="21" font-weight="900">每日执行</text>
    <text x="312" y="276" fill="#64748b" font-family="Arial, sans-serif" font-size="14">事项 / 刷题 / 倒计时</text>
  </g>
  <g filter="url(#flowShadow)">
    <rect x="512" y="166" width="184" height="128" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="532" y="186" width="44" height="44" rx="14" fill="#fdf2f8"/>
    <text x="548" y="215" fill="#db2777" font-family="Arial, sans-serif" font-size="20" font-weight="900">3</text>
    <text x="532" y="252" fill="#0f172a" font-family="Arial, sans-serif" font-size="21" font-weight="900">数据记录</text>
    <text x="532" y="276" fill="#64748b" font-family="Arial, sans-serif" font-size="14">题量 / 用时 / 正确率</text>
  </g>
  <g filter="url(#flowShadow)">
    <rect x="732" y="166" width="184" height="128" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="752" y="186" width="44" height="44" rx="14" fill="#fef9c3"/>
    <text x="768" y="215" fill="#ca8a04" font-family="Arial, sans-serif" font-size="20" font-weight="900">4</text>
