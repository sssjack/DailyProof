  </defs>
  <rect width="1200" height="420" rx="30" fill="url(#flowBg)"/>
  <text x="74" y="78" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="900">从目标到证据的闭环</text>
  <text x="74" y="112" fill="#64748b" font-family="Arial, sans-serif" font-size="17">DailyProof 不只是记录结果，而是让计划、执行、复盘和下一步建议持续循环。</text>
  <path d="M198 230 H990" stroke="url(#flowAccent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M990 230 L960 212 V248 L990 230Z" fill="#22d3ee"/>
  <g filter="url(#flowShadow)">
    <rect x="72" y="166" width="184" height="128" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
